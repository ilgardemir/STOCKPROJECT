# Tells Railway's Nixpacks builder to provide both Node and Python,
# and to install dependencies for both before starting the app.

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install",
  "pip install --break-system-packages -r requirements.txt"
]

[start]
cmd = "node server.js"
